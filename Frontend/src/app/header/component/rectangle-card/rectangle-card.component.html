<div
  class="w-full max-w-[60rem] max-sm:max-w-[18rem] mx-auto border border-gray-400 rounded-xl my-4 overflow-hidden hover:shadow-xl transition-shadow duration-300 flex flex-col sm:flex-row"
  (click)="onCardClick()"
>
  <!-- Image Container -->
  <div class="w-full sm:w-[39rem] h-[27rem] overflow-hidden">
    <img
      [src]="blog?.image_url"
      alt="santorini"
      class="w-full h-full object-cover hover:scale-105 transition-transform duration-300"
    />
  </div>

  <!-- Content Container -->
  <div class="w-full sm:w-[15rem] h-[10rem] p-4">
    <h1 class="text-xl font-bold text-gray-900">{{ blog?.headline }}</h1>
    <p class="text-gray-600 text-sm leading-relaxed line-clamp-4">
      {{ blog?.description }}
    </p>
  </div>
</div>
