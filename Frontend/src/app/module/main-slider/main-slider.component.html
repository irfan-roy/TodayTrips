<div
  class="relative w-full h-[29rem] overflow-hidden rounded-xl shadow-2xl group"
>
  <!-- Slider Container -->
  <div
    class="flex h-full transition-transform duration-700 ease-out"
    [style.transform]="'translateX(-' + currentIndex * 100 + '%)'"
  >
    <div
      *ngFor="let data of mainData; let i = index"
      class="w-full flex-shrink-0 relative h-full"
    >
      <!-- Image with Parallax Effect -->
      <div class="absolute inset-0 overflow-hidden">
        <img
          [src]="data.image"
          class="w-full h-full object-cover transition-transform duration-700"
          [class.scale-105]="currentIndex === i"
          alt="Slide image"
        />
        <!-- Vignette Overlay -->
        <div
          class="absolute inset-0 bg-gradient-to-br from-black/30 via-transparent to-black/50"
        ></div>
      </div>

      <!-- Content Container -->
      <div class="absolute inset-0 flex flex-col justify-between p-8">
        <!-- Description with Slide-in Animation -->
        <div
          class="transition-all duration-700 delay-100"
          [ngClass]="{
            'translate-x-0 opacity-100': currentIndex === i,
            '-translate-x-12 opacity-0': currentIndex !== i
          }"
        >
          <h2
            class="text-5xl font-black leading-tight max-w-2xl bg-clip-text text-transparent bg-gradient-to-r from-white via-amber-100 to-amber-300 drop-shadow-2xl"
          >
            {{ data.description }}
          </h2>
          <div
            class="mt-4 w-24 h-1 bg-gradient-to-r from-amber-400 to-transparent rounded-full"
          ></div>
        </div>

        <!-- Button with Slide-up Animation -->
        <div
          class="flex justify-end transition-all duration-700 delay-200"
          [ngClass]="{
            'translate-y-0 opacity-100': currentIndex === i,
            'translate-y-8 opacity-0': currentIndex !== i
          }"
        >
          <button
            class="group/btn relative px-8 py-3 bg-white/90 backdrop-blur-sm text-stone-900 font-bold rounded-full shadow-xl hover:shadow-2xl transition-all duration-300 overflow-hidden"
          >
            <span class="relative z-10 flex items-center gap-2">
              {{ data.button }}
              <i
                class="fa-solid fa-arrow-right text-sm transition-transform duration-300 group-hover/btn:translate-x-1"
              ></i>
            </span>
            <div
              class="absolute inset-0 bg-gradient-to-r from-amber-400 to-orange-500 opacity-0 group-hover/btn:opacity-100 transition-opacity duration-300"
            ></div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Navigation Arrows INSIDE (visible on hover) -->
  <button
    (click)="moveSlide(-1)"
    class="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/20 backdrop-blur-md text-white rounded-full shadow-lg opacity-0 group-hover:opacity-100 hover:bg-white/30 hover:scale-110 transition-all duration-300 z-30"
  >
    <i class="fa-solid fa-chevron-left"></i>
  </button>

  <button
    (click)="moveSlide(1)"
    class="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/20 backdrop-blur-md text-white rounded-full shadow-lg opacity-0 group-hover:opacity-100 hover:bg-white/30 hover:scale-110 transition-all duration-300 z-30"
  >
    <i class="fa-solid fa-chevron-right"></i>
  </button>

  <!-- Progress Bar -->
  <div class="absolute bottom-0 left-0 right-0 h-1 bg-white/20 z-30">
    <div
      class="h-full bg-gradient-to-r from-amber-100 to-orange-500 transition-all duration-700 ease-out"
      [style.width]="((currentIndex + 1) / mainData.length) * 100 + '%'"
    ></div>
  </div>

  <!-- Dots with Counter -->
  <div
    class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-3 z-30"
  >
    <!-- <span
      class="text-white/80 text-sm font-semibold backdrop-blur-sm bg-black/20 px-3 py-1 rounded-full"
    >
      {{ currentIndex + 1 }} / {{ mainData.length }}
    </span> -->
    <div class="flex gap-2">
      <button
        *ngFor="let data of mainData; let i = index"
        (click)="goToSlide(i)"
        class="transition-all duration-300 rounded-full"
        [ngClass]="{
          'w-8 h-2 bg-white': currentIndex === i,
          'w-2 h-2 bg-white/50 hover:bg-white/75': currentIndex !== i
        }"
      ></button>
    </div>
  </div>
</div>
