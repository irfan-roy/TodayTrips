<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 p-4">
  <div
    class="w-full max-w-[370px] mx-auto border rounded-2xl shadow-sm hover:shadow-md transition-shadow"
    *ngFor="let offer of offers"
  >
    <app-place-card
      [images]="offer.images"
      card="h-[185px] w-full rounded-t-2xl object-cover"
    ></app-place-card>
    <div class="info p-4">
      <h1 class="text-lg font-semibold mb-2 line-clamp-2">{{ offer.title }}</h1>
      <app-rating [review]="offer?.ratings[0]"></app-rating>

      <div
        class="H_amenities text-green-800 my-3"
        *ngFor="let prov of offer.provides"
      >
        <i [class]="prov.icon"></i>
        <span class="ml-2 text-sm">{{ prov.name }}</span>
      </div>

      <div class="amenities flex flex-col gap-2 my-3">
        <div *ngFor="let amen of offer.amenities" class="flex items-center">
          <i [class]="amen.icon" class="text-gray-600"></i>
          <span class="ml-2 text-sm">{{ amen.name }}</span>
        </div>
      </div>

      <div class="refund rounded-lg">
        <p class="text-sm font-medium text-sky-800">Fully refundable</p>
        <p class="text-xs text-gray-600">Before Mon, 21 Jul</p>
      </div>

      <button
        class="mt-2 text-blue-500 hover:text-blue-700 font-medium text-sm transition-colors"
        (click)="toggle()"
      >
        More details <i class="fa-solid fa-chevron-right text-xs ml-1"></i>
      </button>
    </div>
    <div class="border-t bg-gray-50 rounded-b-2xl">
      <app-payment
        [extras]="offer.extras"
        [originalPrice]="offer.price"
        [offer]="offer"
        [nights]="2"
        [TravelData]="data"
      ></app-payment>
    </div>
  </div>
</div>

<!-- more details -->
<app-toggle-show *ngIf="display" Toggle="w-full max-w-[800px] mx-auto p-4">
  <app-place-card
    [images]="offers[0].images"
    card="h-[250px] sm:h-[350px] w-full rounded-lg object-cover"
  ></app-place-card>
  <h1 class="mt-4 text-xl sm:text-2xl font-semibold">{{ offers[0].title }}</h1>
  <p class="text-gray-600 text-sm sm:text-base">City view</p>

  <div
    class="grid grid-cols-2 sm:grid-cols-3 gap-2 sm:gap-4 text-center bg-blue-50 mt-4 p-4 rounded-2xl"
  >
    <div *ngFor="let room of room_Amenities" class="py-3">
      <i [class]="room.icon" class="text-xl sm:text-2xl text-blue-600"></i>
      <p class="text-xs sm:text-sm mt-2">{{ room.name }}</p>
    </div>
  </div>

  <section class="my-6">
    <p class="text-lg sm:text-xl font-semibold mb-4">Unit amenities</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <ul *ngFor="let room of room_amenities" class="mb-4">
        <li class="flex items-center gap-2 mb-2">
          <i [class]="room.icon" class="text-lg sm:text-xl text-gray-700"></i>
          <span class="text-sm sm:text-base font-medium">{{ room.area }}</span>
        </li>
        <li
          *ngFor="let info of room.information"
          class="ml-6 text-xs sm:text-sm text-gray-600 list-disc list-inside mb-1"
        >
          {{ info }}
        </li>
      </ul>
    </div>
  </section>

  <div class="my-4 p-4 border rounded-2xl shadow-sm bg-white">
    <h1 class="text-base sm:text-lg font-semibold mb-3">Room options</h1>
    <app-payment
      [extras]="offers[0].extras"
      [originalPrice]="7420"
      [nights]="2"
    ></app-payment>
  </div>
</app-toggle-show>
