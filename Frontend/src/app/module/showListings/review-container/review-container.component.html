<div class="flex gap-2" [ngClass]="class">
  <div class="Overall_r w-36">
    <h1 class="mb-2 text-sm font-semibold">Overall rating</h1>
    <div
      class="Overall_r flex gap-2 items-center"
      *ngFor="let rating of ratings"
    >
      <span class="text-[10px]"> {{ rating.rating }} </span>
      <div class="w-28 bg-gray-200 rounded-full h-1 overflow-hidden my-1">
        <div class="bg-black h-6" [style.width.%]="rating.value"></div>
      </div>
    </div>
  </div>

  <div class="Overall_r flex gap-2" [ngClass]="class">
    <div
      *ngFor="let val of values"
      class="border-l flex flex-col items-center w-36 gap-0"
    >
      <span class="text-sm font-semibold">{{ val.name }}</span>
      <span class="text-lg font-semibold">{{ val.rating }}</span>
      <i [class]="val.icon" class="mt-6 text-2xl"></i>
    </div>
  </div>
</div>
