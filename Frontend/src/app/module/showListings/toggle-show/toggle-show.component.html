<div
  *ngIf="display"
  class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-start p-4 z-50"
>
  <div
    class="bg-white p-4 rounded-lg w-full max-w-full md:min-w-[40rem] md:max-w-[80rem] h-[40rem] shadow-lg"
    [ngClass]="Toggle"
  >
    <!-- Close Button -->
    <div class="flex">
      <button
        (click)="toggle()"
        class="flex items-center justify-center w-10 h-10 pb-1 rounded-full text-3xl font-normal text-sky-500 hover:bg-blue-200 hover:scale-110 hover:shadow-lg active:scale-95 active:bg-sky-200 transition-all duration-300 ease-out"
      >
        &times;
      </button>
    </div>

    <!-- Scrollable Content -->
    <div class="h-[35rem] overflow-y-auto p-2 mt-2">
      <ng-content></ng-content>
    </div>
  </div>
</div>
