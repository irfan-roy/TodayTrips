<div
  class="flex justify-center items-center w-[20rem] py-6 px-4 bg-white rounded-2xl transition-transform duration-300 hover:border hover:scale-105 hover:shadow-xl"
>
  <div>
    <h1 class="text-xl font-semibold text-gray-800 mb-6">Nightly Price</h1>

    <div class="flex gap-4">
      <!-- Min -->
      <p-inputgroup>
        <p-iftalabel>
          <p-inputnumber
            [(ngModel)]="rangeValues[0]"
            inputId="minPrice"
            mode="currency"
            currency="INR"
            locale="en-US"
            (onInput)="onMinInputChange($event)"
            [inputStyle]="{
              'background-color': 'white',
              color: '#334155',
              'font-size': '14px',
              'border-radius': '8px',
              width: '130px',
              border: '1px solid #CBD5E1'
            }"
          ></p-inputnumber>
          <label for="minPrice" class="text-sm text-gray-500">Min</label>
        </p-iftalabel>
      </p-inputgroup>

      <!-- Max -->
      <p-inputgroup>
        <p-iftalabel>
          <p-inputnumber
            [(ngModel)]="rangeValues[1]"
            inputId="minPrice"
            mode="currency"
            currency="INR"
            locale="en-US"
            (onInput)="onMaxInputChange($event)"
            [inputStyle]="{
              'background-color': 'white',
              color: '#334155',
              'font-size': '14px',
              'border-radius': '8px',
              width: '130px',
              border: '1px solid #CBD5E1'
            }"
          ></p-inputnumber>
          <label for="maxPrice" class="text-sm text-gray-500">Max</label>
        </p-iftalabel>
      </p-inputgroup>
    </div>

    <!-- Slider -->
    <div class="mt-10">
      <p-slider
        [(ngModel)]="rangeValues"
        [range]="true"
        [min]="0"
        [max]="100000"
        (onSlideEnd)="onSliderChange($event)"
        styleClass="custom-slider w-full"
      ></p-slider>
    </div>
  </div>
</div>
