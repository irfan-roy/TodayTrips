<div class="p-2 flex gap-2">
  <div class="relative w-34">
    <select
      name="filterName"
      class="w-40 px-4 py-2 pr-10 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white text-gray-700 cursor-pointer appearance-none"
    >
      <option value="" disabled selected class="text-gray-500">
        {{ filterName }}
      </option>
      <option
        [value]="value"
        *ngFor="let value of propertyTypes"
        class="text-gray-700"
      >
        {{ value }}
      </option>
    </select>
    <div
      class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none"
    >
      <svg
        class="w-5 h-5 text-gray-400"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M19 9l-7 7-7-7"
        ></path>
      </svg>
    </div>
  </div>
</div>
