<app-ads></app-ads>
<div
  class="flex justify-center gap-4 lg:flex-row md:flex-col md:items-center sm:flex-col sm:items-center"
>
  <app-display-ad></app-display-ad> <app-add-owner></app-add-owner>
</div>

<div
  class="container flex flex-col lg:items-center justify-center px-4 sm:px-8 lg:px-32 md:px-2"
>
  <app-search class=""></app-search>
  <!-- <search></search> -->

  <div class="flex flex-col lg:flex-row justify-between gap-4 lg:gap-6">
    <app-all-filters
      class="w-full lg:w-auto lg:min-w-[250px] lg:max-w-[300px]"
      (checkboxFilter)="applyFilter($event)"
      (categoryFilter)="applyCategoryFilter($event)"
      (minChange)="minValueSorting($event)"
      (maxChange)="maxValueSorting($event)"
    ></app-all-filters>
    <div *ngIf="filterListings" class="flex-1 w-full">
      <app-product
        class="z-0"
        *ngFor="let list of filterListings"
        [listing]="list"
      ></app-product>
    </div>
  </div>
</div>
