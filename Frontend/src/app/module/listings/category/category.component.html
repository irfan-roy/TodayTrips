<div class="my-4">
  <h1 class="text-xl font-semibold mb-2">Amenities</h1>
  <div class="grid grid-cols-2 gap-3">
    <div *ngFor="let cat of category">
      <label
        class="flex flex-col items-center justify-center border rounded-xl w-32 p-3 text-gray-700 cursor-pointer shadow-sm transition duration-300 ease-in-out"
        [ngClass]="{
          'bg-gray-200 shadow-xl border-1 ': selectedCategories.includes(
            cat.name
          )
        }"
      >
        <!-- Hidden Checkbox -->
        <input
          type="checkbox"
          class="hidden"
          [checked]="selectedCategories.includes(cat.name)"
          (change)="toggleCategory(cat.name, $event)"
        />

        <!-- Icon + Name -->
        <i [ngClass]="cat.icon" class="text-2xl mb-1"></i>
        <span class="text-sm font-medium w-32 text-center">{{ cat.name }}</span>
      </label>
    </div>
  </div>
</div>
